name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "k8s/**"
      - ".github/workflows/backend.yml"

env:
  AWS_REGION: ap-south-2
  ECR_REPOSITORY: resumeai-backend
  ECR_REPOSITORY_CHROMA: resumeai-chromadb
  EKS_CLUSTER: resumeai-cluster

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm test --if-present

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                       -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
                       ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Mirror ChromaDB image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker pull chromadb/chroma:latest
          docker tag chromadb/chroma:latest $ECR_REGISTRY/$ECR_REPOSITORY_CHROMA:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_CHROMA:latest

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}
          kubectl get nodes

      - name: Clean up old pods
        run: |
          kubectl scale deployment backend --replicas=0 -n resumeai || true
          kubectl scale deployment chromadb --replicas=0 -n resumeai || true
          kubectl delete pods --all -n resumeai --force --grace-period=0 || true
          sleep 10

      - name: Apply K8s manifests
        run: |
          kubectl apply -f k8s/namespace.yaml

          kubectl create secret generic backend-secrets \
            --namespace=resumeai \
            --from-literal=MONGO_URI="${{ secrets.MONGO_URI }}" \
            --from-literal=FIREBASE_CLIENT_EMAIL="${{ secrets.FIREBASE_CLIENT_EMAIL }}" \
            --from-literal=FIREBASE_PRIVATE_KEY="${{ secrets.FIREBASE_PRIVATE_KEY }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
            --from-literal=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --from-literal=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --from-literal=GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            --from-literal=RAZORPAY_KEY_ID="${{ secrets.RAZORPAY_KEY_ID }}" \
            --from-literal=RAZORPAY_KEY_SECRET="${{ secrets.RAZORPAY_KEY_SECRET }}" \
            --from-literal=AWS_REGION="ap-south-2" \
            --from-literal=AWS_S3_BUCKET_NAME="resume-builder-uploads-05" \
            --from-literal=FIREBASE_PROJECT_ID="saas-d3182" \
            --from-literal=CHROMA_URL="http://chromadb-service:8000" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f k8s/chromadb/deployment.yaml
          kubectl apply -f k8s/chromadb/service.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Deploy new image to EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl set image deployment/backend \
            backend=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --namespace=resumeai

          kubectl rollout status deployment/backend \
            --namespace=resumeai \
            --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n resumeai
          kubectl get ingress -n resumeai
